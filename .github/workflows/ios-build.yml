# GitHub Actions — Unity iOS → Xcode → IPA assinado (development)
#
# Secrets Unity (obrigatorias):
#   UNITY_LICENSE, UNITY_EMAIL, UNITY_PASSWORD
#
# Secrets Apple (obrigatorias para IPA instalavel):
#   APPLE_CERTIFICATE_BASE64
#   APPLE_CERTIFICATE_PASSWORD
#   APPLE_PROVISIONING_PROFILE_BASE64
#   APPLE_TEAM_ID
#   APPLE_SIGNING_IDENTITY   (ex: "Apple Development: Seu Nome (XXXXXXXXXX)")
#   KEYCHAIN_PASSWORD         (string aleatoria para keychain temporaria do CI)
#
# Disparo: Actions > iOS Build > Run workflow

name: iOS Build

on:
  workflow_dispatch:

# IPA assinado — SOMENTE manual (requer secrets Apple).
# Push em main NAO dispara este workflow.
# Para IPA sem credenciais Apple: workflow "iOS Test (Sideloadly)".

env:
  UNITY_VERSION: 6000.5.2f1
  BUNDLE_ID: com.teleportnative.app
  IOS_MIN: "15.0"

jobs:
  build-ios:
    name: Unity → Xcode → IPA assinado
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 1

      - name: Validar secrets Apple
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          missing=0
          for v in APPLE_CERTIFICATE_BASE64 APPLE_CERTIFICATE_PASSWORD APPLE_PROVISIONING_PROFILE_BASE64 APPLE_TEAM_ID APPLE_SIGNING_IDENTITY KEYCHAIN_PASSWORD; do
            if [ -z "${!v}" ]; then
              echo "::error::Secret ausente: $v — veja GITHUB_ACTIONS_IOS.md"
              missing=1
            fi
          done
          exit $missing

      - name: Cache Unity Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ env.UNITY_VERSION }}-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
          restore-keys: |
            Library-${{ env.UNITY_VERSION }}-

      - name: Preparar certificado e profile (para PostProcessBuild Unity)
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -e
          mkdir -p build
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > build/apple_cert.p12
          echo "$APPLE_PROVISIONING_PROFILE_BASE64" | base64 --decode > build/profile.mobileprovision
          PROFILE_UUID=$(security cms -D -i build/profile.mobileprovision 2>/dev/null | plutil -extract UUID raw -)
          echo "APPLE_PROVISIONING_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          cp build/profile.mobileprovision "$PP_DIR/${PROFILE_UUID}.mobileprovision"
          KEYCHAIN="${RUNNER_TEMP}/teleport-pre.keychain-db"
          security delete-keychain "$KEYCHAIN" 2>/dev/null || true
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import build/apple_cert.p12 -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" -A -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain

      - name: Unity — export Xcode (game-ci)
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_PROVISIONING_PROFILE_UUID: ${{ env.APPLE_PROVISIONING_PROFILE_UUID }}
        with:
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: iOS
          projectPath: .
          buildMethod: TeleportNative.Editor.BuildiOS.Build
          allowDirtyBuild: true
          versioning: None
          customParameters: -logFile Build/unity-export.log

      - name: Verificar export Xcode
        run: |
          test -d ios/Unity-iPhone.xcodeproj || {
            echo "::error::Export falhou — ios/Unity-iPhone.xcodeproj ausente"
            exit 1
          }
          ls -la ios/

      - name: CocoaPods
        run: |
          cd ios
          pod install --repo-update || pod install
          test -d Unity-iPhone.xcworkspace || { echo "::error::xcworkspace ausente"; exit 1; }

      - name: Archive, export e validar IPA
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPLE_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          chmod +x scripts/ios/sign-and-export.sh
          scripts/ios/sign-and-export.sh

      - name: Upload TeleportNative.ipa
        uses: actions/upload-artifact@v4
        with:
          name: TeleportNative-ipa
          path: build/TeleportNative.ipa
          retention-days: 14
          if-no-files-found: error

      - name: Upload logs (fallback)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs
          path: |
            Build/unity-export.log
            build/DerivedData/Logs/**
          if-no-files-found: ignore
          retention-days: 7
