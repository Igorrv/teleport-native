# GitHub Actions — IPA a partir de ios/ (sem Unity)

name: Build iOS IPA (Xcode only)

on:
  workflow_dispatch:

jobs:
  ios:
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Verificar ios/
        run: |
          test -d ios/Unity-iPhone.xcodeproj || {
            echo "ios/ vazio — exporte no Mac (BUILD_IOS.md) e commite."
            exit 1
          }

      - name: pod install
        run: |
          cd ios
          pod install

      - name: Build IPA
        run: |
          xcodebuild -allowProvisioningUpdates \
            -workspace ios/Unity-iPhone.xcworkspace \
            -scheme Unity-iPhone \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath build/ios/TeleportNative.xcarchive \
            archive
          mkdir -p build/ios/ipa
          xcodebuild -exportArchive \
            -archivePath build/ios/TeleportNative.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist \
            -allowProvisioningUpdates

      - uses: actions/upload-artifact@v4
        with:
          name: ios-ipa
          path: build/ios/ipa/*.ipa
          if-no-files-found: error
