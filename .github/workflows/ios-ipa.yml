name: Build iOS IPA

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "xcode = export Xcode | ipa = tentar IPA"
        required: true
        default: xcode
        type: choice
        options: [xcode, ipa]

jobs:
  ios:
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/cache@v4
        with:
          path: Library
          key: Library-${{ hashFiles('Assets/**', 'Packages/**', 'ProjectSettings/**') }}
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        with:
          unityVersion: 6000.5.2f1
          targetPlatform: iOS
          projectPath: .
          buildMethod: TeleportNative.Editor.IosCiMenu.PrepareForIosExport
          allowDirtyBuild: true
      - uses: actions/upload-artifact@v4
        with:
          name: ios-xcode
          path: Build/Xcode
          retention-days: 14
      - name: Build IPA
        if: inputs.mode == 'ipa'
        run: |
          cd Build/Xcode
          xcodebuild -allowProvisioningUpdates -project Unity-iPhone.xcodeproj -scheme Unity-iPhone \
            -configuration Release -destination 'generic/platform=iOS' \
            -archivePath ../ios/TeleportNative.xcarchive archive || true
          mkdir -p ../ios/ipa
          echo '<?xml version="1.0"?><plist version="1.0"><dict><key>method</key><string>development</string><key>signingStyle</key><string>automatic</string></dict></plist>' > ../ios/ExportOptions.plist
          xcodebuild -exportArchive -archivePath ../ios/TeleportNative.xcarchive -exportPath ../ios/ipa -exportOptionsPlist ../ios/ExportOptions.plist -allowProvisioningUpdates || true
      - uses: actions/upload-artifact@v4
        if: inputs.mode == 'ipa'
        with:
          name: ios-ipa
          path: Build/ios/ipa/*.ipa
          if-no-files-found: ignore
