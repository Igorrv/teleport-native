workflows:
  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic

      vars:
        UNITY_VERSION: "6000.5.2f1"
        UNITY_CHANGESET: "eb73d3b415a1"
        BUNDLE_ID: "com.teleportnative.app"

      xcode: latest
      cocoapods: default

    cache:
      cache_paths:
        - $HOME/Library/Unity
        - $HOME/Unity
        - $HOME/Library/Caches/com.unity3d.UnityEditor
        - $CM_BUILD_DIR/Library

    scripts:


      - name: Install Unity Editor
        script: |
          set -e

          UNITY_BIN="$HOME/Unity/Hub/Editor/$UNITY_VERSION/Unity.app/Contents/MacOS/Unity"


          if [ -f "$UNITY_BIN" ]; then
            echo "Unity already installed"
            echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV
            exit 0
          fi


          echo "Downloading Unity $UNITY_VERSION"


          curl -L \
          "https://download.unity3d.com/download_unity/$UNITY_CHANGESET/MacEditorInstaller/Unity-$UNITY_VERSION.pkg" \
          -o /tmp/unity.pkg


          echo "Installing Unity"


          sudo installer \
          -pkg /tmp/unity.pkg \
          -target /


          UNITY_BIN=$(find /Applications -path "*Unity.app/Contents/MacOS/Unity" -type f | head -1)


          if [ -z "$UNITY_BIN" ]; then
            echo "Unity not found after install"
            find /Applications -name "*Unity*" || true
            exit 1
          fi


          echo "Unity found:"
          echo "$UNITY_BIN"


          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV



      - name: Generate Unity License Request
        script: |
          set -e

          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -createManualActivationFile \
          -logFile -

          ls -la

      - name: Unity Export Xcode
        script: |
          set -e

          source $CM_ENV


          mkdir -p "$CM_BUILD_DIR/Build"


          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"



      - name: Build Archive
        script: |
          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates





      - name: Export IPA
        script: |
          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          cat > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>signingStyle</key>
            <string>automatic</string>
          </dict>
          </plist>
          EOF


          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates



   artifacts:
   
      - Unity_v6000.5.2f1.alf
      
      - "**/*.alf"
      
      - Build/codemagic-unity.log

      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log
