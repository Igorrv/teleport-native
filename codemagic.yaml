workflows:
  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic

      vars:
        UNITY_VERSION: "6000.5.2f1"
        BUNDLE_ID: "com.teleportnative.app"

      xcode: latest
      cocoapods: default


    cache:

      cache_paths:
        - $CM_BUILD_DIR/Library



    scripts:


      # =====================================
      # Verifica ambiente
      # =====================================

      - name: Environment check

        script: |

          set -e

          echo "=============================="
          echo "Teleport Native Build"
          echo "=============================="

          echo "Project:"
          echo "$CM_BUILD_DIR"

          echo "Unity version:"
          echo "$UNITY_VERSION"

          echo ""

          ls -la /Applications



      # =====================================
      # Encontrar Unity
      # =====================================

      - name: Locate Unity

        script: |

          set -e


          echo "Looking for Unity executable..."


          if [ -f "/Applications/Unity/Unity.app/Contents/MacOS/Unity" ]; then

              UNITY_BIN="/Applications/Unity/Unity.app/Contents/MacOS/Unity"

          elif [ -f "/Applications/Unity.app/Contents/MacOS/Unity" ]; then

              UNITY_BIN="/Applications/Unity.app/Contents/MacOS/Unity"

          else

              UNITY_BIN=$(find /Applications \
              -name Unity \
              -type f \
              | head -1)

          fi



          if [ -z "$UNITY_BIN" ]; then

              echo "Unity executable not found"

              find /Applications -name "*Unity*" || true

              exit 1

          fi



          echo "Unity found:"
          echo "$UNITY_BIN"



          "$UNITY_BIN" \
          -version



          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV



      # =====================================
      # Exportar Unity para Xcode
      # =====================================

      - name: Unity export Xcode

        script: |

          set -e


          source $CM_ENV


          mkdir -p "$CM_BUILD_DIR/Build"



          echo "Running Unity:"
          echo "$UNITY_BIN"



          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"



      # =====================================
      # Compilar projeto Xcode
      # =====================================

      - name: Build Xcode Archive

        script: |

          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"



          mkdir -p "$CM_BUILD_DIR/Build/ios"



          xcodebuild \
          -allowProvisioningUpdates \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination "generic/platform=iOS" \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive



      # =====================================
      # Gerar IPA
      # =====================================

      - name: Export IPA

        script: |

          set -e



          cat > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" <<EOF

<?xml version="1.0" encoding="UTF-8"?>

<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
"http://www.apple.com/DTDs/PropertyList-1.0.dtd">

<plist version="1.0">

<dict>


<key>method</key>

<string>development</string>


<key>signingStyle</key>

<string>automatic</string>


</dict>

</plist>

EOF



          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates




    artifacts:

      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log



    publishing:

      email:

        recipients:

          - user@example.com


        notify:

          success: true

          failure: true
