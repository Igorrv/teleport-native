workflows:

  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic


      vars:

        UNITY_VERSION: "6000.5.2f1"

        UNITY_CHANGESET: "eb73d3b415a1"

        BUNDLE_ID: "com.teleportnative.app"


      xcode: latest

      cocoapods: default



    cache:

      cache_paths:

        - /Applications/Unity

        - $CM_BUILD_DIR/Library

        - $HOME/Library/Caches/com.unity3d.UnityEditor

        - $HOME/.local/share/unity3d



    scripts:



      - name: Install Unity Editor

        script: |

          set -e


          UNITY_PATH="/Applications/Unity/Unity-$UNITY_VERSION/Unity.app/Contents/MacOS/Unity"



          echo "Checking Unity..."



          if [ -f "$UNITY_PATH" ]; then


              echo "Unity already installed"

          else


              echo "Installing Unity $UNITY_VERSION"



              curl -L \
              "https://download.unity3d.com/download_unity/$UNITY_CHANGESET/MacEditorInstaller/Unity-$UNITY_VERSION.pkg" \
              -o /tmp/unity.pkg



              sudo installer \
              -pkg /tmp/unity.pkg \
              -target /



          fi



          if [ ! -f "$UNITY_PATH" ]; then

              echo "Unity executable missing after installation"

              find /Applications -name Unity -type f

              exit 1

          fi



          echo "Unity found:"

          echo "$UNITY_PATH"



          echo "UNITY_BIN=$UNITY_PATH" >> $CM_ENV





      - name: Unity License

        script: |

          set -e


          source $CM_ENV



          mkdir -p "$HOME/.local/share/unity3d/Unity"



          if [ -n "$UNITY_LICENSE" ]; then


              echo "Using UNITY_LICENSE"



              echo "$UNITY_LICENSE" \
              > "$HOME/.local/share/unity3d/Unity/Unity_lic.ulf"



          else


              echo "UNITY_LICENSE not found"



              echo "Generating ALF"



              "$UNITY_BIN" \
              -batchmode \
              -nographics \
              -quit \
              -createManualActivationFile \
              -logFile -



              echo "Generated files:"



              find "$CM_BUILD_DIR" -name "*.alf"



              exit 1



          fi





      - name: Unity Export Xcode

        script: |

          set -e


          source $CM_ENV



          mkdir -p "$CM_BUILD_DIR/Build"



          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"





      - name: Install CocoaPods

        script: |

          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"


          pod install || true





      - name: Build Xcode Archive

        script: |

          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"



          mkdir -p "$CM_BUILD_DIR/Build/ios"



          xcodebuild \

          -workspace Unity-iPhone.xcworkspace \

          -scheme Unity-iPhone \

          -configuration Release \

          -destination generic/platform=iOS \

          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \

          archive \

          -allowProvisioningUpdates





      - name: Export IPA

        script: |

          set -e



          mkdir -p "$CM_BUILD_DIR/Build/ios/ipa"



          python3 <<'PY'

          import plistlib
          import os


          path = os.path.join(
              os.environ["CM_BUILD_DIR"],
              "Build/ios/ExportOptions.plist"
          )


          data = {

              "method": "development",

              "signingStyle": "automatic"

          }


          with open(path, "wb") as f:

              plistlib.dump(data, f)


          print("ExportOptions created")

          PY



          xcodebuild \

          -exportArchive \

          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \

          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \

          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \

          -allowProvisioningUpdates





    artifacts:


      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log

      - "**/*.alf"




    publishing:


      email:


        recipients:

          - user@example.com


        notify:


          success: true

          failure: true
