# Codemagic — iOS IPA (Sideloadly)
# Group "unity_credentials": UNITY_LICENSE (.ulf) OU UNITY_SERIAL+EMAIL+PASSWORD

workflows:
  ios-sideload:
    name: Teleport Native - iOS IPA
    max_build_duration: 120
    instance_type: mac_mini_m2
    environment:
      groups:
        - unity_credentials
      ios_signing:
        distribution_type: development
        bundle_identifier: com.teleportnative.app
      vars:
        UNITY_VERSION: "6000.5.2f1"
        UNITY_CHANGESET: "eb73d3b415a1"
        BUNDLE_ID: "com.teleportnative.app"
        UNITY_IOS_DIR: Build/Xcode
        XCODE_PROJECT: Unity-iPhone.xcodeproj
        XCODE_SCHEME: Unity-iPhone
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - /Applications/Unity
        - $CM_BUILD_DIR/Library
        - $HOME/Library/Caches/com.unity3d.UnityEditor
        - $HOME/.local/share/unity3d
    scripts:
      - name: Instalar Unity 6.5.2f1
        script: |
          set -e
          TARGET="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app"
          if [ ! -d "$TARGET" ]; then
            yes Y | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
              --version "$UNITY_VERSION" --changeset "$UNITY_CHANGESET" -a arm64
            yes Y | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install-modules \
              --version "$UNITY_VERSION" -m ios -a arm64
          fi
          echo "UNITY_HOME=$TARGET" >> "$CM_ENV"
          echo "UNITY_BIN=$TARGET/Contents/MacOS/Unity" >> "$CM_ENV"

      - name: Ativar licenca Unity
        script: |
          set -e
          source "$CM_ENV"
          mkdir -p "$HOME/.local/share/unity3d/Unity"
          if [ -n "$UNITY_LICENSE" ]; then
            echo "$UNITY_LICENSE" > "$HOME/.local/share/unity3d/Unity/Unity_lic.ulf"
          elif [ -n "$UNITY_SERIAL" ]; then
            "$UNITY_BIN" -batchmode -nographics -quit -logFile \
              -serial "$UNITY_SERIAL" -username "${UNITY_EMAIL?}" -password "${UNITY_PASSWORD?}"
          else
            echo "Configure UNITY_LICENSE ou UNITY_SERIAL+UNITY_EMAIL+UNITY_PASSWORD"
            exit 1
          fi

      - name: Export Xcode (Unity)
        script: |
          set -e
          source "$CM_ENV"
          mkdir -p "$CM_BUILD_DIR/Build"
          "$UNITY_BIN" -batchmode -nographics -quit \
            -projectPath "$CM_BUILD_DIR" \
            -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
            -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"
          test -d "$CM_BUILD_DIR/$UNITY_IOS_DIR/$XCODE_PROJECT" || exit 1

      - name: CocoaPods + assinatura
        script: |
          set -e
          cd "$CM_BUILD_DIR/$UNITY_IOS_DIR"
          pod install || true
          xcode-project use-profiles || true

      - name: Archive + IPA
        script: |
          set -e
          cd "$CM_BUILD_DIR/$UNITY_IOS_DIR"
          mkdir -p "$CM_BUILD_DIR/Build/ios"
          if [ -d Unity-iPhone.xcworkspace ]; then
            xcodebuild -allowProvisioningUpdates -workspace Unity-iPhone.xcworkspace \
              -scheme "$XCODE_SCHEME" -configuration Release -destination 'generic/platform=iOS' \
              -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" archive
          else
            xcodebuild -allowProvisioningUpdates -project "$XCODE_PROJECT" -scheme "$XCODE_SCHEME" \
              -configuration Release -destination 'generic/platform=iOS' \
              -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" archive
          fi
          cat > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>development</string>
            <key>signingStyle</key><string>automatic</string>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
            -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
            -allowProvisioningUpdates

      - name: Devolver licenca Unity
        script: |
          source "$CM_ENV" 2>/dev/null || true
          "$UNITY_BIN" -batchmode -nographics -quit -returnlicense 2>/dev/null || true
    artifacts:
      - Build/ios/ipa/*.ipa
      - Build/codemagic-unity.log
      - Build/Xcode/**

  ios-xcode-only:
    name: iOS Xcode export only (fallback)
    max_build_duration: 90
    instance_type: mac_mini_m2
    environment:
      groups:
        - unity_credentials
      vars:
        UNITY_VERSION: "6000.5.2f1"
        UNITY_CHANGESET: "eb73d3b415a1"
    scripts:
      - name: Unity export
        script: |
          set -e
          TARGET="/Applications/Unity/Hub/Editor/${UNITY_VERSION}/Unity.app"
          if [ ! -d "$TARGET" ]; then
            yes Y | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install \
              --version "$UNITY_VERSION" --changeset "$UNITY_CHANGESET" -a arm64
            yes Y | /Applications/Unity\ Hub.app/Contents/MacOS/Unity\ Hub -- --headless install-modules \
              --version "$UNITY_VERSION" -m ios -a arm64
          fi
          export UNITY_BIN="$TARGET/Contents/MacOS/Unity"
          mkdir -p "$HOME/.local/share/unity3d/Unity"
          if [ -n "$UNITY_LICENSE" ]; then
            echo "$UNITY_LICENSE" > "$HOME/.local/share/unity3d/Unity/Unity_lic.ulf"
          else
            "$UNITY_BIN" -batchmode -nographics -quit \
              -serial "${UNITY_SERIAL?}" -username "${UNITY_EMAIL?}" -password "${UNITY_PASSWORD?}"
          fi
          "$UNITY_BIN" -batchmode -nographics -quit \
            -projectPath "$CM_BUILD_DIR" \
            -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
            -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"
          "$UNITY_BIN" -batchmode -nographics -quit -returnlicense 2>/dev/null || true
    artifacts:
      - Build/Xcode/**
      - Build/codemagic-unity.log
