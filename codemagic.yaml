# Codemagic — SOMENTE gera .ipa a partir de ios/ (Xcode exportado no Mac).
# Sem Unity, sem licenca, sem ALF/ULF no CI.
#
# Pre-requisito no repo: ios/Unity-iPhone.xcodeproj (+ pod install gera .xcworkspace)
# Export local: Unity Mac > Teleport > 8. Export iOS  (veja BUILD_IOS.md)

workflows:
  ios-ipa:
    name: iOS IPA
    max_build_duration: 45
    instance_type: mac_mini_m2
    environment:
      ios_signing:
        distribution_type: development
        bundle_identifier: com.teleportnative.app
      xcode: latest
      cocoapods: default
    scripts:
      - name: pod install
        script: |
          set -e
          test -d ios/Unity-iPhone.xcodeproj || { echo "Falta ios/ — exporte no Mac (BUILD_IOS.md)"; exit 1; }
          cd ios && pod install

      - name: xcode-project use-profiles
        script: xcode-project use-profiles

      - name: xcode-project build-ipa
        script: |
          set -e
          xcode-project build-ipa \
            --workspace ios/Unity-iPhone.xcworkspace \
            --scheme Unity-iPhone \
            --config Release \
            --export-options-plist ios/ExportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
