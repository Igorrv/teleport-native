workflows:
  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic

      vars:
        UNITY_VERSION: "6000.5.2f1"
        BUNDLE_ID: "com.teleportnative.app"

      xcode: latest
      cocoapods: default


    cache:

      cache_paths:

        - $CM_BUILD_DIR/Library



    scripts:


      - name: Setup Unity

        script: |
          set -e

          echo "Searching Unity"


          if [ -x "/Applications/Unity/Editor/Unity" ]; then

            UNITY="/Applications/Unity/Editor/Unity"

          else

            UNITY=$(find /Applications -type f -path "*Unity.app/Contents/MacOS/Unity" | head -1)

          fi



          if [ -z "$UNITY" ]; then

            echo "Unity not found"

            find /Applications -iname "*Unity*" || true

            exit 1

          fi



          echo "Unity found:"
          echo "$UNITY"


          echo "UNITY=$UNITY" >> $CM_ENV



      - name: Unity Export Xcode

        script: |
          set -e


          source $CM_ENV


          mkdir -p "$CM_BUILD_DIR/Build"



          "$UNITY" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"



          if [ ! -d "$CM_BUILD_DIR/Build/Xcode" ]; then

            echo "Xcode project missing"

            cat "$CM_BUILD_DIR/Build/codemagic-unity.log"

            exit 1

          fi




      - name: Build Xcode Archive

        script: |
          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"


          mkdir -p "$CM_BUILD_DIR/Build/ios"



          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates





      - name: Export IPA

        script: |
          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios"



          printf '%s\n' \
          '<?xml version="1.0" encoding="UTF-8"?>' \
          '<plist version="1.0">' \
          '<dict>' \
          '<key>method</key>' \
          '<string>development</string>' \
          '<key>signingStyle</key>' \
          '<string>automatic</string>' \
          '</dict>' \
          '</plist>' \
          > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist"



          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates



    artifacts:

      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log



    publishing:

      email:

        recipients:

          - user@example.com

        notify:

          success: true

          failure: true
