workflows:

  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 180

    instance_type: mac_mini_m2


    environment:

      groups:

        - codemagic


      vars:

        UNITY_VERSION: "6000.5.2f1"
        UNITY_CHANGESET: "eb73d3b415a1"
        BUNDLE_ID: "com.teleportnative.app"


      xcode: latest
      cocoapods: default



    cache:

      cache_paths:

        - $HOME/Library/Unity
        - $CM_BUILD_DIR/Library



    scripts:


      - name: Install Unity Editor

        script: |

          set -e


          echo "Installing Unity Editor"



          UNITY_PATH="$HOME/Unity/Hub/Editor/$UNITY_VERSION/Unity.app/Contents/MacOS/Unity"



          if [ -f "$UNITY_PATH" ]; then

              echo "Unity already exists"

              echo "UNITY_BIN=$UNITY_PATH" >> $CM_ENV

              exit 0

          fi



          mkdir -p "$HOME/Unity/Hub/Editor"



          echo "Downloading Unity"



          curl -L \
          "https://download.unity3d.com/download_unity/$UNITY_CHANGESET/MacEditorInstaller/Unity-$UNITY_VERSION.pkg" \
          -o /tmp/unity.pkg



          echo "Installing Unity"



          sudo installer \
          -pkg /tmp/unity.pkg \
          -target /



          UNITY_BIN=$(find /Applications -path "*Unity.app/Contents/MacOS/Unity" -type f | head -1)



          if [ -z "$UNITY_BIN" ]; then

              echo "Unity install failed"

              find /Applications -name "*Unity*" || true

              exit 1

          fi



          echo "FOUND:"
          echo "$UNITY_BIN"


          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV





      - name: Unity Export Xcode

        script: |

          set -e


          source $CM_ENV



          mkdir -p "$CM_BUILD_DIR/Build"



          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"





      - name: Build Archive

        script: |

          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"



          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates





      - name: Export IPA

        script: |

          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios"



          python3 <<EOF

import plistlib

data = {
    "method":"development",
    "signingStyle":"automatic"
}

with open("$CM_BUILD_DIR/Build/ios/ExportOptions.plist","wb") as f:
    plistlib.dump(data,f)

EOF



          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates



    artifacts:

      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log
