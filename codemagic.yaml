workflows:
  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic

      vars:
        BUNDLE_ID: com.teleportnative.app
        UNITY_VERSION: 6000.5.2f1

      xcode: latest
      cocoapods: default


    cache:
      cache_paths:
        - $CM_BUILD_DIR/Library


    scripts:


      - name: Debug Unity Installation
        script: |
          set -e

          echo "===== APPLICATIONS ====="

          ls -la /Applications

          echo ""
          echo "===== UNITY DIRECTORY ====="

          ls -la /Applications/Unity || true

          echo ""
          echo "===== SEARCH UNITY FILES ====="

          find /Applications/Unity -type f -name "Unity" 2>/dev/null || true

          find /Applications/Unity -type f -perm +111 2>/dev/null || true



      - name: Locate Unity
        script: |
          set -e


          echo "Finding Unity executable..."


          UNITY_BIN=$(find /Applications/Unity \
          -type f \
          -name "Unity" \
          -perm +111 \
          2>/dev/null | head -1)



          if [ -z "$UNITY_BIN" ]; then

            echo "No Unity executable found inside /Applications/Unity"

            echo "Full tree:"

            find /Applications/Unity -maxdepth 5 -type f | head -200

            exit 1

          fi



          echo "FOUND UNITY:"
          echo "$UNITY_BIN"


          "$UNITY_BIN" -version


          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV





      - name: Unity Export Xcode
        script: |
          set -e


          source $CM_ENV


          mkdir -p "$CM_BUILD_DIR/Build"


          echo "Executing Unity:"
          echo "$UNITY_BIN"



          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"



          if [ ! -d "$CM_BUILD_DIR/Build/Xcode" ]; then

            echo "Unity did not generate Xcode project"

            cat "$CM_BUILD_DIR/Build/codemagic-unity.log" || true

            exit 1

          fi





      - name: Build Xcode Archive
        script: |
          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates





      - name: Export IPA
        script: |
          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          printf '%s\n' \
          '<?xml version="1.0" encoding="UTF-8"?>' \
          '<plist version="1.0">' \
          '<dict>' \
          '<key>method</key>' \
          '<string>development</string>' \
          '<key>signingStyle</key>' \
          '<string>automatic</string>' \
          '</dict>' \
          '</plist>' \
          > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist"



          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates




    artifacts:

      - Build/ios/ipa/*.ipa
      - Build/codemagic-unity.log
