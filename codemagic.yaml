workflows:
  ios-sideload:
    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2

    environment:
      groups:
        - codemagic

      vars:
        BUNDLE_ID: com.teleportnative.app
        UNITY_VERSION: 6000.5.2f1

      xcode: latest
      cocoapods: default


    cache:
      cache_paths:
        - $CM_BUILD_DIR/Library


    scripts:

      - name: Check Environment
        script: |
          set -e

          echo "Teleport Native Build"
          echo "Build path:"
          echo "$CM_BUILD_DIR"

          ls -la /Applications


      - name: Locate Unity
        script: |
          set -e

          if [ -x "/Applications/Unity/Unity.app/Contents/MacOS/Unity" ]; then
            UNITY_BIN="/Applications/Unity/Unity.app/Contents/MacOS/Unity"

          elif [ -x "/Applications/Unity.app/Contents/MacOS/Unity" ]; then
            UNITY_BIN="/Applications/Unity.app/Contents/MacOS/Unity"

          else
            UNITY_BIN=$(find /Applications -path "*Unity.app/Contents/MacOS/Unity" | head -1)
          fi


          if [ -z "$UNITY_BIN" ]; then
            echo "Unity not found"
            find /Applications -iname "*unity*" || true
            exit 1
          fi


          echo "Unity:"
          echo "$UNITY_BIN"

          "$UNITY_BIN" -version

          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV



      - name: Unity export Xcode
        script: |
          set -e

          source $CM_ENV

          mkdir -p "$CM_BUILD_DIR/Build"


          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"


          if [ ! -d "$CM_BUILD_DIR/Build/Xcode" ]; then
            echo "Xcode export failed"

            cat "$CM_BUILD_DIR/Build/codemagic-unity.log" || true

            exit 1
          fi



      - name: Build Archive
        script: |
          set -e

          cd "$CM_BUILD_DIR/Build/Xcode"


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates



      - name: Export IPA
        script: |
          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          printf '%s\n' \
          '<?xml version="1.0" encoding="UTF-8"?>' \
          '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
          '<plist version="1.0">' \
          '<dict>' \
          '<key>method</key>' \
          '<string>development</string>' \
          '<key>signingStyle</key>' \
          '<string>automatic</string>' \
          '</dict>' \
          '</plist>' \
          > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist"


          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates



    artifacts:
      - Build/ios/ipa/*.ipa
      - Build/codemagic-unity.log


    publishing:
      email:
        recipients:
          - user@example.com

        notify:
          success: true
          failure: true
