workflows:
  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic

      vars:
        UNITY_VERSION: "6000.5.2f1"
        BUNDLE_ID: "com.teleportnative.app"

      xcode: latest
      cocoapods: default


    cache:

      cache_paths:
        - $HOME/Library/Caches/com.unity3d.UnityEditor
        - $CM_BUILD_DIR/Library


    scripts:


      - name: Setup Unity
        script: |
          set -e

          echo "Finding Unity..."

          UNITY_BIN=$(find /Applications/Unity -name Unity -type f | head -1)

          if [ -z "$UNITY_BIN" ]; then
            echo "Unity not found"
            exit 1
          fi

          echo "Unity found:"
          echo "$UNITY_BIN"

          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV



      - name: Activate Unity License
        script: |
          set -e

          source $CM_ENV

          if [ -z "$UNITY_LICENSE" ]; then

            echo "UNITY_LICENSE missing"
            echo "Generating ALF..."

            "$UNITY_BIN" \
            -batchmode \
            -nographics \
            -quit \
            -createManualActivationFile \
            -logFile -

            exit 1

          else

            echo "Unity license detected"

            mkdir -p ~/.local/share/unity3d/Unity

            echo "$UNITY_LICENSE" > ~/.local/share/unity3d/Unity/Unity_lic.ulf

          fi



      - name: Unity Export Xcode
        script: |
          set -e

          source $CM_ENV


          mkdir -p "$CM_BUILD_DIR/Build"


          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"



      - name: Install CocoaPods
        script: |
          set -e

          cd "$CM_BUILD_DIR/Build/Xcode"

          pod install || true



      - name: Build Xcode Archive
        script: |
          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          xcodebuild \
          -workspace Unity-iPhone.xcworkspace \
          -scheme Unity-iPhone \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates



            - name: Export IPA
        script: |
          set -e

          mkdir -p "$CM_BUILD_DIR/Build/ios/ipa"

          cat > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" <<EOF
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>method</key>
    <string>development</string>

    <key>signingStyle</key>
    <string>automatic</string>
</dict>
</plist>
EOF

          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
            -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
            -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
            -allowProvisioningUpdates


    artifacts:

      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log

      - "**/*.alf"



    publishing:

      email:

        recipients:

          - user@example.com

        notify:

          success: true

          failure: true
