workflows:
  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      unity: 6000.5.2f1

      xcode: latest

      cocoapods: default


      groups:
        - codemagic


      vars:

        BUNDLE_ID: com.teleportnative.app

        UNITY_VERSION: 6000.5.2f1



    cache:

      cache_paths:

        - $CM_BUILD_DIR/Library

        - $HOME/Library/Unity



    scripts:


      - name: Check Unity

        script: |

          set -e


          echo "Checking Unity"


          which unity || true


          echo "Unity version"


          unity -version || true



      - name: Unity Export Xcode

        script: |

          set -e


          mkdir -p "$CM_BUILD_DIR/Build"



          echo "Exporting iOS Xcode project"


          unity \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"



          if [ ! -d "$CM_BUILD_DIR/Build/Xcode" ]; then

              echo "Xcode project was not created"


              cat "$CM_BUILD_DIR/Build/codemagic-unity.log" || true


              exit 1

          fi



      - name: Build Archive

        script: |

          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"



          mkdir -p "$CM_BUILD_DIR/Build/ios"



          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates



      - name: Export IPA

        script: |

          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios"



          cat > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" <<'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">

<plist version="1.0">

<dict>

<key>method</key>
<string>development</string>

<key>signingStyle</key>
<string>automatic</string>

</dict>

</plist>
PLIST



          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates



    artifacts:

      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log



    publishing:

      email:

        recipients:

          - user@example.com


        notify:

          success: true

          failure: true
