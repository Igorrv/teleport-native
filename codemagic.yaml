workflows:
  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic

      vars:
        UNITY_VERSION: "6000.5.2f1"
        BUNDLE_ID: "com.teleportnative.app"

      xcode: latest
      cocoapods: default


    cache:
      cache_paths:
        - $CM_BUILD_DIR/Library



    scripts:


      - name: Install Unity Editor

        script: |
          set -e


          echo "Installing Unity $UNITY_VERSION"


          echo "Checking Unity Hub"


          /Applications/"Unity Hub.app"/Contents/MacOS/"Unity Hub" \
          --version || true



          mkdir -p "$HOME/Library/Unity"



          /Applications/"Unity Hub.app"/Contents/MacOS/"Unity Hub" \
          --headless \
          install \
          --version "$UNITY_VERSION" \
          --changeset eb73d3b415a1 \
          --module ios \
          --module mac-mono



      - name: Locate Unity

        script: |
          set -e


          echo "Searching Unity Editor"


          UNITY_BIN=$(find "$HOME/Unity" \
          -path "*/Contents/MacOS/Unity" \
          -type f \
          | head -1)



          if [ -z "$UNITY_BIN" ]; then

            UNITY_BIN=$(find "$HOME" \
            -path "*/Unity.app/Contents/MacOS/Unity" \
            -type f \
            | head -1)

          fi



          if [ -z "$UNITY_BIN" ]; then

            echo "Unity Editor not installed"

            find "$HOME" -name Unity.app || true

            exit 1

          fi



          echo "Unity found:"
          echo "$UNITY_BIN"



          "$UNITY_BIN" -version


          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV





      - name: Unity Export Xcode

        script: |
          set -e


          source $CM_ENV


          mkdir -p "$CM_BUILD_DIR/Build"



          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"





      - name: Build Xcode Archive

        script: |
          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates





      - name: Export IPA

        script: |
          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          printf '%s\n' \
          '<?xml version="1.0" encoding="UTF-8"?>' \
          '<plist version="1.0">' \
          '<dict>' \
          '<key>method</key>' \
          '<string>development</string>' \
          '<key>signingStyle</key>' \
          '<string>automatic</string>' \
          '</dict>' \
          '</plist>' \
          > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist"



          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates




    artifacts:

      - Build/ios/ipa/*.ipa
      - Build/codemagic-unity.log
