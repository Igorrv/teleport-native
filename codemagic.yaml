workflows:

  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic

      vars:
        UNITY_VERSION: "6000.5.2f1"
        BUNDLE_ID: "com.teleportnative.app"

      xcode: latest
      cocoapods: default


    cache:

      cache_paths:

        - $CM_BUILD_DIR/Library

        - $HOME/Library/Caches/com.unity3d.UnityEditor

        - $HOME/Library/Application Support/Unity


    scripts:


      - name: Locate Unity

        script: |

          set -e

          echo "Searching Unity..."

          UNITY_BIN=$(find /Applications -path "*Unity.app/Contents/MacOS/Unity" -type f | head -1)


          if [ -z "$UNITY_BIN" ]; then

            echo "Unity executable not found"

            exit 1

          fi


          echo "Unity found:"
          echo "$UNITY_BIN"


          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV





      - name: Unity License Check

        script: |

          set -e

          source $CM_ENV


          if [ -z "$UNITY_LICENSE" ]; then


            echo "No UNITY_LICENSE found"

            echo "Creating ALF file..."


            "$UNITY_BIN" \
              -batchmode \
              -nographics \
              -quit \
              -createManualActivationFile \
              -logFile -


            echo ""
            echo "================================"
            echo "UPLOAD THE GENERATED .alf FILE"
            echo "================================"


            find "$CM_BUILD_DIR" -name "*.alf"


            exit 1


          else


            echo "Unity license detected"


            mkdir -p "$HOME/.local/share/unity3d/Unity"


            echo "$UNITY_LICENSE" \
            > "$HOME/.local/share/unity3d/Unity/Unity_lic.ulf"


          fi






      - name: Unity Export Xcode

        script: |

          set -e

          source $CM_ENV


          mkdir -p "$CM_BUILD_DIR/Build"


          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"







      - name: Install Pods

        script: |

          set -e


          if [ -d "$CM_BUILD_DIR/Build/Xcode" ]; then

            cd "$CM_BUILD_DIR/Build/Xcode"

            pod install || true

          fi







      - name: Build iOS Archive

        script: |

          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"


          mkdir -p "$CM_BUILD_DIR/Build/ios"


          xcodebuild \
          -workspace Unity-iPhone.xcworkspace \
          -scheme Unity-iPhone \
          -configuration Release \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates







      - name: Export IPA

        script: |

          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios/ipa"


          python3 <<'PY'

          import plistlib
          import os


          path = os.path.join(
              os.environ["CM_BUILD_DIR"],
              "Build/ios/ExportOptions.plist"
          )


          options = {

              "method": "development",

              "signingStyle": "automatic"

          }


          with open(path, "wb") as f:

              plistlib.dump(options, f)


          print("Created:")
          print(path)

          PY



          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates







    artifacts:


      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log

      - "**/*.alf"





    publishing:


      email:


        recipients:

          - user@example.com


        notify:

          success: true

          failure: true
