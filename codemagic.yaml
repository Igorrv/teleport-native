workflows:
  ios-sideload:

    name: Teleport Native - iOS IPA

    max_build_duration: 120

    instance_type: mac_mini_m2


    environment:

      groups:
        - codemagic

      vars:
        BUNDLE_ID: com.teleportnative.app
        UNITY_VERSION: 6000.5.2f1

      xcode: latest
      cocoapods: default


    cache:

      cache_paths:
        - $CM_BUILD_DIR/Library



    scripts:


      - name: Check Environment

        script: |
          set -e

          echo "================================="
          echo "Teleport Native Build"
          echo "================================="

          echo "Build directory:"
          echo "$CM_BUILD_DIR"

          echo "Applications:"
          ls -la /Applications



      - name: Locate Unity

        script: |
          set -e


          echo "Searching Unity executable..."


          if [ -x "/Applications/Unity" ]; then

              UNITY_BIN="/Applications/Unity"


          elif [ -x "/Applications/Unity/Unity" ]; then

              UNITY_BIN="/Applications/Unity/Unity"


          else

              UNITY_BIN=$(find /Applications -type f -name "Unity" | head -1)

          fi



          if [ -z "$UNITY_BIN" ]; then

              echo "Unity executable not found"

              find /Applications -iname "*unity*" || true

              exit 1

          fi



          echo "Unity executable found:"
          echo "$UNITY_BIN"



          chmod +x "$UNITY_BIN"


          "$UNITY_BIN" -version || true


          echo "UNITY_BIN=$UNITY_BIN" >> $CM_ENV




      - name: Unity Export Xcode

        script: |
          set -e


          source $CM_ENV


          mkdir -p "$CM_BUILD_DIR/Build"



          echo "Running Unity:"
          echo "$UNITY_BIN"



          "$UNITY_BIN" \
          -batchmode \
          -nographics \
          -quit \
          -projectPath "$CM_BUILD_DIR" \
          -executeMethod TeleportNative.Editor.IosCiMenu.PrepareForIosExport \
          -logFile "$CM_BUILD_DIR/Build/codemagic-unity.log"



          if [ ! -d "$CM_BUILD_DIR/Build/Xcode" ]; then

              echo "ERROR: Xcode project was not generated"

              cat "$CM_BUILD_DIR/Build/codemagic-unity.log" || true

              exit 1

          fi




      - name: Build Xcode Archive

        script: |
          set -e


          cd "$CM_BUILD_DIR/Build/Xcode"



          mkdir -p "$CM_BUILD_DIR/Build/ios"



          xcodebuild \
          -scheme Unity-iPhone \
          -configuration Debug \
          -destination generic/platform=iOS \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          archive \
          -allowProvisioningUpdates





      - name: Export IPA

        script: |
          set -e


          mkdir -p "$CM_BUILD_DIR/Build/ios"



          cat > "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>

              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOF



          xcodebuild \
          -exportArchive \
          -archivePath "$CM_BUILD_DIR/Build/ios/TeleportNative.xcarchive" \
          -exportPath "$CM_BUILD_DIR/Build/ios/ipa" \
          -exportOptionsPlist "$CM_BUILD_DIR/Build/ios/ExportOptions.plist" \
          -allowProvisioningUpdates




    artifacts:

      - Build/ios/ipa/*.ipa

      - Build/codemagic-unity.log



    publishing:

      email:

        recipients:

          - user@example.com


        notify:

          success: true

          failure: true
